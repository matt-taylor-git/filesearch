name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[release]

      - name: Verify tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(python -c "from filesearch import __version__; print(__version__)")"
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match app version $APP_VERSION"
            exit 1
          fi

      - name: Build release bundle
        run: python scripts/build_release.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-release
          path: |
            dist/FileSearch-*.zip
            dist/FileSearch-*.tar.gz

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FileSearch-*.zip
            dist/FileSearch-*.tar.gz
